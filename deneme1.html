/* ── Share API ── */
function doShare(){
  var shareUrl=D?D.url:'https://MyHomeLabRepo.github.io/testcard/deneme1.html';
  var name=D?D.n:'Kartvizit';
  if(navigator.share){
    navigator.share({title:name,text:'Dijital kartvizitim',url:shareUrl}).catch(function(){});
  } else {
    if(navigator.clipboard){
      navigator.clipboard.writeText(shareUrl).then(function(){
        var btn=document.getElementById('shareBtn');
        btn.textContent='✅ Kopyalandı';
        setTimeout(function(){btn.textContent='📤 Paylaş';},1800);
      });
    }
  }
}
